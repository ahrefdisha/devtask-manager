apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: devtask-manager-backend:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: devtask
        - name: DB_USER
          value: dishatribedy
        - name: DB_PASSWORD
          value: password
        - name: JWT_SECRET
          value: devtask_super_secret_key_2024
        - name: JWT_EXPIRES_IN
          value: 7d
        - name: NODE_ENV
          value: production
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800
