version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devtask
      POSTGRES_USER: dishatribedy
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: devtask
      DB_USER: dishatribedy
      DB_PASSWORD: password
      JWT_SECRET: devtask_super_secret_key_2024
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
